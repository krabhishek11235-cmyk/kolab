<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kolab Growth Strategy</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sora', sans-serif; background: #050D1A; color: #E2E8F0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .mono { font-family: 'DM Mono', monospace; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .pulse { animation: pulse 2s infinite; }

    /* Header */
    #header {
      background: linear-gradient(135deg, #0F1E35 0%, #050D1A 60%);
      border-bottom: 1px solid #1E293B;
      padding: 32px 40px 28px;
      position: relative; overflow: hidden;
    }
    #header::after {
      content: '';
      position: absolute; top:0; right:0;
      width:400px; height:200px;
      background: radial-gradient(ellipse at top right, rgba(0,212,180,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-inner { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:20px; }
    .header-left .badge { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .dot { width:10px; height:10px; border-radius:50%; background:#00D4B4; }
    .badge-text { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#00D4B4; }
    h1 { font-size: clamp(28px,4vw,40px); font-weight:800; letter-spacing:-1px; line-height:1.1; margin-bottom:6px; }
    .subtitle { color:#64748B; font-size:14px; font-weight:300; }
    .kpis { display:flex; gap:12px; flex-wrap:wrap; }
    .kpi-card { background:#0F1E35; border:1px solid #1E293B; border-radius:10px; padding:14px 18px; min-width:120px; }
    .kpi-val { font-size:18px; font-weight:700; color:#00D4B4; }
    .kpi-label { font-size:10px; color:#64748B; margin-top:2px; }

    /* Tabs */
    #tabs { padding:24px 40px 0; display:flex; gap:12px; flex-wrap:wrap; }
    .tab-btn {
      border-radius:8px; padding:12px 22px; cursor:pointer;
      font-family:'Sora',sans-serif; font-size:13px;
      border:1px solid #1E293B; background:#0F1E35; color:#64748B; font-weight:500;
      transition: all 0.25s ease;
    }
    .tab-btn:hover { transform: translateY(-2px); }
    .tab-btn.active { font-weight:700; }
    .tab-label { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; opacity:0.7; }

    /* Main grid */
    #main { padding:24px 40px 40px; display:grid; grid-template-columns:1fr 320px; gap:24px; }
    @media(max-width:900px) { #main { grid-template-columns:1fr; } #tabs { padding:20px 20px 0; } #header { padding:24px 20px; } #main { padding:20px; } }

    /* Month header */
    .month-hdr {
      border-radius:10px; padding:20px 24px; margin-bottom:20px;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
      background:#0F1E35;
    }
    .month-hdr-left .badge2 { font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
    .month-hdr-left h2 { font-size:22px; font-weight:700; }
    .month-hdr-stats { display:flex; gap:20px; flex-wrap:wrap; }
    .stat { text-align:center; }
    .stat-val { font-size:20px; font-weight:700; }
    .stat-label { font-size:10px; color:#64748B; }

    /* Tactics */
    #tactics-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:600px) { #tactics-grid { grid-template-columns:1fr; } }
    .tactic {
      background:#0A1628; border:1px solid #1E293B; border-radius:10px; padding:16px 18px;
      transition:all 0.2s ease; cursor:default;
    }
    .tactic:hover { transform:translateX(4px); background:#1E293B; }
    .tactic-icon { font-size:22px; margin-bottom:8px; }
    .tactic-title { font-size:13px; font-weight:600; color:#F1F5F9; margin-bottom:6px; }
    .tactic-desc { font-size:12px; color:#64748B; line-height:1.6; font-weight:300; }

    /* Sidebar panels */
    #sidebar { display:flex; flex-direction:column; gap:16px; }
    .panel { background:#0F1E35; border:1px solid #1E293B; border-radius:10px; padding:20px; }
    .panel-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#64748B; margin-bottom:4px; }
    .panel-val { font-size:16px; font-weight:700; margin-bottom:8px; }

    /* Bar chart */
    .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .bar-name { width:110px; font-size:11px; color:#94A3B8; text-align:right; }
    .bar-track { flex:1; background:#1E293B; border-radius:3px; height:20px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; display:flex; align-items:center; padding-left:8px; transition:width 0.8s ease; }
    .bar-pct { font-size:10px; font-weight:700; color:#0F172A; }

    /* Timeline */
    .tl-item { display:flex; gap:12px; align-items:flex-start; margin-bottom:14px; }
    .tl-col { display:flex; flex-direction:column; align-items:center; }
    .tl-dot {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700; flex-shrink:0;
      transition: background 0.3s, border-color 0.3s;
    }
    .tl-line { width:2px; height:20px; margin-top:2px; transition: background 0.3s; }
    .tl-info { padding-top:4px; }
    .tl-name { font-size:12px; font-weight:600; }
    .tl-target { font-size:11px; color:#475569; }

    /* North star */
    .ns-panel { border-radius:10px; padding:18px; }
    .ns-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .ns-key { font-size:11px; color:#94A3B8; }
    .ns-val { font-size:11px; font-weight:600; }
  </style>
</head>
<body>

<div id="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="badge">
        <div class="dot pulse"></div>
        <span class="mono badge-text">Performance Marketing Roadmap</span>
      </div>
      <h1><span style="color:#fff">Kolab </span><span style="color:#00D4B4">Growth Strategy</span></h1>
      <p class="subtitle">500–600 Small Business Downloads · 4-Month Sprint · ₹18L Total Budget</p>
    </div>
    <div class="kpis">
      <div class="kpi-card"><div class="kpi-val">₹18L</div><div class="mono kpi-label">Total Budget</div></div>
      <div class="kpi-card"><div class="kpi-val">550+</div><div class="mono kpi-label">Target Downloads</div></div>
      <div class="kpi-card"><div class="kpi-val">₹3,272</div><div class="mono kpi-label">Avg. Blended CPI</div></div>
      <div class="kpi-card"><div class="kpi-val" style="font-size:13px;line-height:1.3">Installs → Reg.</div><div class="mono kpi-label">Primary KPI</div></div>
    </div>
  </div>
</div>

<div id="tabs"></div>
<div id="main">
  <div id="left-col">
    <div class="month-hdr" id="month-hdr">
      <div class="month-hdr-left">
        <div class="mono badge2" id="hdr-badge"></div>
        <h2 id="hdr-theme"></h2>
      </div>
      <div class="month-hdr-stats">
        <div class="stat"><div class="stat-val" id="hdr-budget"></div><div class="mono stat-label">AD SPEND</div></div>
        <div class="stat"><div class="stat-val" id="hdr-target" style="color:#fff"></div><div class="mono stat-label">DOWNLOADS</div></div>
        <div class="stat"><div class="stat-val" id="hdr-cpi" style="color:#94A3B8"></div><div class="mono stat-label">TARGET CPI</div></div>
      </div>
    </div>
    <div id="tactics-grid"></div>
  </div>
  <div id="sidebar">
    <div class="panel">
      <div class="mono panel-label">Budget Allocation</div>
      <div class="panel-val" id="sidebar-budget"></div>
      <div id="bar-chart"></div>
    </div>
    <div class="panel" id="timeline-panel">
      <div class="mono panel-label" style="margin-bottom:16px">4-Month Progress</div>
      <div id="timeline"></div>
    </div>
    <div class="ns-panel" id="ns-panel">
      <div class="mono panel-label" style="margin-bottom:10px" id="ns-label"></div>
      <div id="ns-rows"></div>
    </div>
  </div>
</div>

<script>
const months = [
  {
    id:1, label:"Month 1", theme:"BUILD & TEST", color:"#FF6B35",
    budget:"₹4,00,000", target:"80–100 downloads", cpi:"₹3,800–4,000", focus:"Foundation Setting",
    tactics:[
      {icon:"🎯",title:"Tracking Infrastructure",desc:"Set up AppsFlyer / Firebase attribution, Meta Pixel, Google Tag Manager. No campaign runs without clean data."},
      {icon:"🎨",title:"Creative Testing (A/B)",desc:"Launch 6–8 ad creatives across pain-point angles: 'Stop losing brand deals', 'Get paid faster as a creator', 'Find creators who convert'."},
      {icon:"📱",title:"Meta App Install Campaigns",desc:"Target small business owners (25–45), interests: D2C brands, retail, marketing tools. Budget: ₹1.6L"},
      {icon:"🔍",title:"Google UAC Launch",desc:"Universal App Campaigns targeting SMB keywords. Let Google optimize across Search, Play Store, YouTube. Budget: ₹1.4L"},
      {icon:"💼",title:"LinkedIn Lead Funnel",desc:"Brand managers, marketing heads at SMBs (10–100 employees). Drive to app download landing page. Budget: ₹0.6L"},
      {icon:"📊",title:"Baseline KPIs",desc:"CTR benchmark, CPI per channel, install-to-registration rate. Week 3 audit decides where to scale."},
    ],
    channels:[
      {name:"Meta Ads",pct:40,color:"#FF6B35"},
      {name:"Google UAC",pct:35,color:"#FFB347"},
      {name:"LinkedIn",pct:15,color:"#4FC3F7"},
      {name:"Testing Buffer",pct:10,color:"#78909C"},
    ],
  },
  {
    id:2, label:"Month 2", theme:"SCALE WINNERS", color:"#00D4B4",
    budget:"₹4,50,000", target:"130–150 downloads", cpi:"₹3,000–3,500", focus:"Double Down on Performers",
    tactics:[
      {icon:"🚀",title:"Scale Top 2 Creatives",desc:"Kill underperformers. Put 70% of Meta budget into the 2 best-performing ad creatives from Month 1."},
      {icon:"🎬",title:"UGC Video Ads",desc:"Onboard 3–4 micro-influencers (small business owners) to create authentic 'how I found brand deals' reels. Budget: ₹0.5L"},
      {icon:"🔁",title:"Retargeting Layer",desc:"Retarget website visitors, app store page visitors, video viewers (50%+). These convert at 3–5x lower CPI."},
      {icon:"👥",title:"Lookalike Audiences",desc:"Build 1%, 2%, 3% LALs from existing installs. Seed audience with registered users for highest quality."},
      {icon:"📍",title:"Geo Prioritisation",desc:"Focus on Tier 1 cities (Mumbai, Delhi, Bengaluru, Hyderabad, Chennai) where SMB marketing budget is concentrated."},
      {icon:"📧",title:"Install-to-Activation Push",desc:"Set up Day 1 / Day 3 push notification flows to convert installs → active users (brands posting briefs)."},
    ],
    channels:[
      {name:"Meta Ads",pct:38,color:"#00D4B4"},
      {name:"Google UAC",pct:30,color:"#00BFA5"},
      {name:"UGC / Influencer",pct:18,color:"#4FC3F7"},
      {name:"LinkedIn",pct:14,color:"#78909C"},
    ],
  },
  {
    id:3, label:"Month 3", theme:"OPTIMISE & EXPAND", color:"#A78BFA",
    budget:"₹4,50,000", target:"150–180 downloads", cpi:"₹2,500–3,000", focus:"Efficiency + New Channels",
    tactics:[
      {icon:"⚡",title:"Dynamic Creative Optimisation",desc:"Launch DCO campaigns — let Meta auto-combine headlines, images, CTAs. Reduces creative fatigue significantly."},
      {icon:"🎥",title:"YouTube Pre-Roll",desc:"30-sec skippable ads targeting SMB owners watching business, marketing, startup content. Strong for brand + downloads."},
      {icon:"🤝",title:"Partnership Downloads",desc:"Tie up with 2–3 SMB communities, WhatsApp groups, industry associations for co-promotions and direct outreach."},
      {icon:"🏪",title:"App Store Optimisation (ASO)",desc:"Optimise title, description, screenshots for 'brand collaboration app', 'influencer marketing platform for brands'."},
      {icon:"📈",title:"Bid Strategy Shift",desc:"Move from lowest cost to Cost Cap bidding on Meta — tells algorithm your target CPI, locks in efficiency."},
      {icon:"🔔",title:"Re-engagement Campaigns",desc:"Target churned installs (downloaded but never registered). Offer 'free first collaboration' to reactivate."},
    ],
    channels:[
      {name:"Meta Ads",pct:35,color:"#A78BFA"},
      {name:"Google UAC",pct:28,color:"#C084FC"},
      {name:"YouTube",pct:15,color:"#F472B6"},
      {name:"Influencer",pct:22,color:"#4FC3F7"},
    ],
  },
  {
    id:4, label:"Month 4", theme:"PUSH TO GOAL", color:"#F59E0B",
    budget:"₹5,00,000", target:"160–200 downloads", cpi:"₹2,500–3,000", focus:"Maximum Velocity",
    tactics:[
      {icon:"🏁",title:"Full Budget Deployment",desc:"No testing this month. All ₹5L into proven channels at proven CPIs. Zero waste."},
      {icon:"🎁",title:"Referral Program Launch",desc:"In-app referral: 'Invite a brand, get 1 free boosted listing'. Word-of-mouth flywheel kicks in for SMBs."},
      {icon:"📣",title:"PR + Content Amplification",desc:"Publish case study: '3 brands that landed 10x creator deals via Kolab'. Seed in SMB media for organic downloads."},
      {icon:"🧲",title:"Lead Gen → App Funnel",desc:"Meta Lead Gen Ads → automated WhatsApp sequence → direct app download link. Reduces friction massively."},
      {icon:"🏆",title:"Social Proof Ads",desc:"Ads featuring real testimonials from brands already on platform. 'We ran 5 campaigns in 2 months.' Converts skeptics."},
      {icon:"📲",title:"Final Sprint Retargeting",desc:"Blast retargeting to every touchpoint: website, video viewers, app store visitors, lead gen respondents. Close the funnel."},
    ],
    channels:[
      {name:"Meta Ads",pct:40,color:"#F59E0B"},
      {name:"Google UAC",pct:28,color:"#FBBF24"},
      {name:"Influencer",pct:20,color:"#F472B6"},
      {name:"WhatsApp Funnel",pct:12,color:"#78909C"},
    ],
  },
];

const northStar = [
  {label:"Install → Register Rate", target:"> 60%"},
  {label:"Register → Brief Posted", target:"> 30%"},
  {label:"Weekly Retention (D7)", target:"> 25%"},
  {label:"Blended CPI", target:"< ₹3,500"},
];

let active = 0;

function render() {
  const m = months[active];

  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = months.map((mo, i) => `
    <button class="tab-btn ${i===active?'active':''}" onclick="setMonth(${i})"
      style="${i===active?`background:${mo.color};border-color:${mo.color};color:#050D1A;`:''}">
      <span class="mono tab-label">${mo.label}</span>${mo.theme}
    </button>
  `).join('');

  // Month header
  document.getElementById('month-hdr').style.borderLeft = `3px solid ${m.color}`;
  document.getElementById('month-hdr').style.borderColor = m.color + '22';
  document.getElementById('hdr-badge').textContent = `${m.label} · ${m.focus}`;
  document.getElementById('hdr-badge').style.color = m.color;
  document.getElementById('hdr-theme').textContent = m.theme;
  document.getElementById('hdr-budget').textContent = m.budget;
  document.getElementById('hdr-budget').style.color = m.color;
  document.getElementById('hdr-target').textContent = m.target;
  document.getElementById('hdr-cpi').textContent = m.cpi;

  // Tactics
  document.getElementById('tactics-grid').innerHTML = m.tactics.map(t => `
    <div class="tactic">
      <div class="tactic-icon">${t.icon}</div>
      <div class="tactic-title">${t.title}</div>
      <div class="tactic-desc">${t.desc}</div>
    </div>
  `).join('');
  document.getElementById('tactics-grid').className = 'fade-in';
  void document.getElementById('tactics-grid').offsetWidth;

  // Sidebar budget
  document.getElementById('sidebar-budget').textContent = m.budget + ' / month';
  document.getElementById('sidebar-budget').style.color = m.color;
  document.getElementById('bar-chart').innerHTML = m.channels.map(c => `
    <div class="bar-row">
      <div class="mono bar-name">${c.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${c.pct}%;background:${c.color}">
          <span class="mono bar-pct">${c.pct}%</span>
        </div>
      </div>
    </div>
  `).join('');

  // Timeline
  document.getElementById('timeline').innerHTML = months.map((mo, i) => `
    <div class="tl-item">
      <div class="tl-col">
        <div class="tl-dot" style="
          background:${i<=active?mo.color:'#1E293B'};
          border:2px solid ${i<=active?mo.color:'#334155'};
          color:${i<=active?'#050D1A':'#475569'}
        ">${mo.id}</div>
        ${i<months.length-1?`<div class="tl-line" style="background:${i<active?mo.color:'#1E293B'}"></div>`:''}
      </div>
      <div class="tl-info">
        <div class="tl-name" style="color:${i===active?mo.color:i<active?'#94A3B8':'#475569'}">${mo.theme}</div>
        <div class="mono tl-target">${mo.target}</div>
      </div>
    </div>
  `).join('');

  // North star
  const nsPanel = document.getElementById('ns-panel');
  nsPanel.style.background = `linear-gradient(135deg, ${m.color}18, ${m.color}05)`;
  nsPanel.style.border = `1px solid ${m.color}33`;
  document.getElementById('ns-label').style.color = m.color;
  document.getElementById('ns-label').textContent = 'North Star Metrics';
  document.getElementById('ns-rows').innerHTML = northStar.map(ns => `
    <div class="ns-row">
      <span class="ns-key">${ns.label}</span>
      <span class="mono ns-val" style="color:${m.color}">${ns.target}</span>
    </div>
  `).join('');
}

function setMonth(i) {
  active = i;
  render();
}

render();
</script>
</body>
</html>
